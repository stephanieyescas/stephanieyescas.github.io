<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8">
    <title>SCLA</title>
    <link rel="stylesheet" href="main.css">
  </head>
  <body>
    <h1>smallest to LARGEST</h1>
    <h2>Input any three numbers to have them sorted in ascending order. Non-numeric values will return NaN error message.</h2>
    Enter first number <input id="number1" type="text"></input>
    Enter second number <input id="number2" type="text"></input>
    Enter third number <input id="number3" type="text"></input>
    <input type="submit" value="Click me!" onclick="sort()">
    <script src="app.js"></script>
    <noscript>You need to enable JavaScript to view the full site.</noscript>
  </body>
</html>
